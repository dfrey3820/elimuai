version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: elimuai_db
    environment:
      POSTGRES_DB: elimuai_db
      POSTGRES_USER: elimuai_user
      POSTGRES_PASSWORD: elimuai_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elimuai_user -d elimuai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elimuai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elimuai_api
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://elimuai_user:elimuai_pass_dev@postgres:5432/elimuai_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production_64chars_minimum_required
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MPESA_ENVIRONMENT: sandbox
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
