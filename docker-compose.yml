version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: elimuai_db
    environment:
      POSTGRES_DB: elimuai_db
      POSTGRES_USER: elimuai_user
      POSTGRES_PASSWORD: elimuai_pass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elimuai_user -d elimuai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elimuai_redis
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elimuai_api
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://elimuai_user:elimuai_pass_dev@postgres:5432/elimuai_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production_64chars_minimum_required
      QUEUE_HMAC_SECRET: dev_hmac_secret_change_in_production_64chars_minimum
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  mpesa-service:
    build:
      context: ./mpesa-service
      dockerfile: Dockerfile
    container_name: elimuai_mpesa
    ports:
      - "5002:5002"
    environment:
      NODE_ENV: development
      PORT: 5002
      REDIS_URL: redis://redis:6379
      QUEUE_HMAC_SECRET: dev_hmac_secret_change_in_production_64chars_minimum
      MPESA_ENVIRONMENT: sandbox
      MPESA_CALLBACK_BASE_URL: https://malipo.elimuai.africa
      MPESA_ADMIN_API_KEY: dev_mpesa_admin_key_change_in_production
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elimuai_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
