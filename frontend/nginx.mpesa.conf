# M-Pesa Payment Service — pay.elimuai.africa
# This is the subdomain registered with Safaricom for M-Pesa callbacks.
# Deploy this alongside nginx.secure.conf on the EC2 host Nginx.

server {
    listen 80;
    server_name pay.elimuai.africa;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pay.elimuai.africa;

    ssl_certificate /etc/letsencrypt/live/pay.elimuai.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pay.elimuai.africa/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Health check
    location = /health {
        proxy_pass http://localhost:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # M-Pesa STK callback (from Safaricom)
    location /mpesa/callback {
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # C2B confirmation/validation callbacks (from Safaricom)
    location /c2b/ {
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block everything else — this service is not for public browsing
    location / {
        return 404;
    }
}
