name: Deploy EC2 (Cheapest Path)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/elimuai-backend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/elimuai-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.ec2
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/elimuai-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/elimuai-frontend:${{ github.sha }}

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/ec2/docker-compose.prod.yml,deploy/ec2/deploy.sh,deploy/ec2/schema.sql"
          target: "/opt/elimuai"
          strip_components: 2

      - name: Write env on EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_ENV_FILE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            sudo mkdir -p /opt/elimuai
            cd /opt/elimuai
            echo "$APP_ENV_FILE" | sudo tee .env >/dev/null
            sudo chmod 600 .env
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo chmod +x deploy.sh
            sudo APP_DIR=/opt/elimuai ./deploy.sh
