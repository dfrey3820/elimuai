name: EC2 Check Env

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read current .env from EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Docker containers ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1 || true
            echo ""
            echo "=== POSTGRES container env ==="
            sudo docker exec elimuai_postgres env 2>/dev/null | grep -E "POSTGRES_" | sort || echo "Postgres container not running"
            echo ""
            echo "=== FULL backend env (unfiltered) ==="
            sudo docker exec elimuai_backend env 2>/dev/null || echo "Backend container not running"
