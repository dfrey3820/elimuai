name: EC2 Check Env

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read current .env from EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Docker containers ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1 || true
            echo ""
            echo "=== Env vars from RUNNING backend container ==="
            sudo docker exec elimuai_backend env 2>/dev/null | grep -E "POSTGRES|JWT|DATABASE|FRONTEND_URL|ANTHROPIC|MAILTRAP|NODE_ENV|PORT" | sort || echo "Backend container not running"
            echo ""
            echo "=== Current .env file ==="
            sudo cat /opt/elimuai/.env 2>/dev/null || echo "NO .env FILE"
            echo ""
            echo "=== Backend logs (last 30 lines) ==="
            sudo docker logs elimuai_backend --tail=30 2>&1 || echo "No backend container"
